schema: spec-driven

context: |
  ## 项目概况
  仓库：ShuyaCui/deep_research_from_scratch
  目标：基于 LangGraph 构建端到端的深度研究（deep research）系统，通过三阶段 pipeline（Scope → Research → Write）生成专业分析报告。
  领域：美妆行业趋势研究（Beauty Industry Trend Analysis）

  ## 技术栈
  - Language: Python 3.11+
  - Framework: LangGraph (StateGraph, Command, async nodes)
  - LLM: Azure OpenAI（通过 GenAIToken 做 token-based auth）
  - Embeddings / Search: Tavily API
  - Dependency management: uv + pyproject.toml
  - Linting: ruff（Google-style docstrings, isort, pyflakes, pycodestyle）
  - Document parsing: pdfplumber（PDF）, python-pptx（PPTX）

  ## 开发工作流约定（Spec-Driven Development）
  - Constitution 在 specs/mission.md、specs/tech-stack.md、specs/roadmap.md
  - 每个 feature 在 specs/YYYY-MM-DD-feature-name/ 下，含 plan.md、requirements.md、validation.md
  - 所有 Python 源文件由 notebooks/ 里的 %%writefile 单元生成，不能直接改 src/
  - Copilot 代码提交到 development 分支（或 feature branch），不直接提交到 main
  - 先 commit spec，再进入实现阶段
  - feature 分支合并到 development，由人工 PR 合并到 main

  ## 架构原则
  - 优先复用现有代码模式，不做广泛重构
  - 每次只实现一个阶段（skeleton → main logic → edge/tests）
  - 大功能切片后分步实现，保持改动可审查
  - 输出要可验证；不确定时显式标注假设

# Per-artifact rules
rules:
  proposal:
    - 必须包含 Non-goals 部分，防止 scope 膨胀
    - 参考 specs/mission.md 和 specs/tech-stack.md 的长期约束
    - 区分"已确认事实"与"当前假设"，假设要显式标注
  design:
    - 与仓库现有架构对齐（StateGraph、TypedDict state、%%writefile 模式）
    - 说明与现有模块的集成点，避免孤立实现
    - 如果涉及 LLM 调用，说明结构化输出 schema（Pydantic）
  tasks:
    - 每个任务粒度：可在单次对话中独立完成
    - 大 feature 分成 Phase A（骨架）、Phase B（主逻辑）、Phase C（边界/测试/文档）
    - 每个任务完成后列出改动文件和高层摘要
